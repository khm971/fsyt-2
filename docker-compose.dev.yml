# Dev override: volume mounts, backend with reload + debugpy for breakpoints.
# Run: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Attach debugger to localhost:5678 for backend.
services:
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    command: >
      sh -c "pip install debugpy -q &&
        python -m debugpy --listen 0.0.0.0:5678 -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "0.0.0.0:8000:8000"
      - "0.0.0.0:5678:5678"
